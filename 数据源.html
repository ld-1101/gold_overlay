<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>积存金数据源</title>
<style>
body{font-family:'Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;max-width:500px;margin:40px auto;padding:20px}
.card{background:#161b22;border-radius:8px;padding:16px;margin:12px 0}
.price{font-size:28px;font-weight:bold;color:#ffd700}
.up{color:#00e676}.down{color:#ff5252}.gray{color:#8b949e;font-size:13px}
a{color:#58a6ff;font-size:12px}
</style>
</head>
<body>
<h2>🏅 积存金 · 数据一览</h2>
<p class="gray" id="time">加载中...</p>

<div class="card">
  <div>🇨🇳 国内金价（估算）</div>
  <div class="price" id="rmb">--</div>
  <div id="rmb_chg"></div>
</div>

<div class="card">
  <div>🌍 伦敦金</div>
  <span id="xau"></span> <span id="xau_chg"></span>
</div>

<div class="card">
  <div>💵 美元人民币</div>
  <span id="usd"></span>
</div>

<p class="gray">数据源：新浪财经 hq.sinajs.cn · 每5秒刷新</p>

<script>
async function fetchData(){
  try{
    let [xau,usd] = await Promise.all([
      fetch('https://hq.sinajs.cn/list=hf_XAU',{headers:{Referer:'https://finance.sina.com.cn'}}).then(r=>r.text()),
      fetch('https://hq.sinajs.cn/list=USDCNY',{headers:{Referer:'https://finance.sina.com.cn'}}).then(r=>r.text())
    ]);
    let xp = xau.split('"')[1].split(',');
    let up = usd.split('"')[1].split(',');
    let xPrice=parseFloat(xp[0]), xPrev=parseFloat(xp[1]);
    let uPrice=parseFloat(up[1]), uPrev=parseFloat(up[2]);
    let rmb = xPrice * uPrice / 31.1035;
    let rmbPrev = xPrev * uPrev / 31.1035;
    let rmbChg = rmb - rmbPrev;
    let rmbPct = rmbPrev ? (rmbChg/rmbPrev*100) : 0;

    document.getElementById('rmb').textContent = rmb.toFixed(2) + ' 元/克';
    document.getElementById('rmb_chg').innerHTML = fmtChg(rmbChg, rmbPct);
    document.getElementById('xau').textContent = xPrice.toFixed(2) + ' USD/oz';
    document.getElementById('xau_chg').innerHTML = fmtChg(xPrice-xPrev, xPrev?(xPrice-xPrev)/xPrev*100:0);
    document.getElementById('usd').textContent = uPrice.toFixed(4);
    document.getElementById('time').textContent = '更新：' + new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('time').textContent = '❌ 获取失败，请刷新';
  }
}
function fmtChg(chg, pct){
  let cl = chg>=0?'up':'down';
  let s = chg>0?'+':'';
  return `<span class="${cl}">${s}${chg.toFixed(2)} &nbsp; ${s}${pct.toFixed(2)}%</span>`;
}
fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
